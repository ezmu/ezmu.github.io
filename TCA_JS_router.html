<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tiered AI Router — Profile & Input Fixed</title>
  <script>
    // === Core Router & Layers ===
    const WH_WORDS = new Set(['what', 'who', 'where', 'when', 'which', 'how']);
    const YES_NO_PATTERN = /^(is|are|do|does|can|could|should|will)\s+/i;
    const CREATIVE_PATTERN = /\b(write|poem|story|imagine|draw|design|create|poet|storytell)\b/i;
    const MATH_PATTERN = /[+\-*/^=√π∞∑∏≠≤≥≈]|\b(calculate|calc|convert|conv|function|func|code)\b/i;
    const LOOKUP_TRIGGERS = /\b(wife|spouse|wif|spous|capital|cap|capitol|president|pres|presidant|population|pop|height|hgt|distance|dist)\b/i;
    const THANK_YOU_PATTERN = /\b(thank|شكرا|thanks|thx|ty|tq|appreciate|grateful)\b/i;

    const CORRECTIONS = {
      'presidant': 'president', 'capitol': 'capital', 'wif': 'wife', 'spous': 'spouse',
      'calc': 'calculate', 'conv': 'convert', 'func': 'function', 'hgt': 'height',
      'dist': 'distance', 'pop': 'population', 'poet': 'poem', 'storytell': 'story',
      'pres': 'president', 'cap': 'capital', 'km': 'km', 'mi': 'miles', 'π': 'pi',
      'thx': 'thanks', 'ty': 'thank you', 'tq': 'thank you'
    };

    function normalizeQuery(query) {
      let q = query.trim().toLowerCase();
      Object.entries(CORRECTIONS).forEach(([wrong, right]) => {
        q = q.replace(new RegExp(`\\b${wrong}\\b`, 'gi'), right);
      });
      q = q.replace(/[^a-z0-9+\-*/^=√π∞∑∏≠≤≥≈\s]/g, ' ');
      return q.replace(/\s+/g, ' ');
    }

    function analyzeStructure(query) {
      const q = normalizeQuery(query);
      const hasWh = [...WH_WORDS].some(w => q.includes(w));
      const hasNumber = /\b\d+\b/.test(query);
      const hasMath = MATH_PATTERN.test(q);
      const isYesNo = YES_NO_PATTERN.test(query);
      const isCreative = CREATIVE_PATTERN.test(q);
      const isLookup = LOOKUP_TRIGGERS.test(q);
      const isThankYou = THANK_YOU_PATTERN.test(q);
      const length = query.length;
      return { hasWh, hasNumber, hasMath, isYesNo, isCreative, isLookup, isThankYou, length, normalized: q };
    }

    function routeQuery(query) {
      const start = performance.now();
      const { hasWh, hasNumber, hasMath, isYesNo, isCreative, isLookup, isThankYou, length } = analyzeStructure(query);

      if (/^\s*(hi|hello|hey|bye|goodbye|good morning|good evening|good night|howdy|salam|sup|yo)\s*$/i.test(query)) {
        return { layer: 1, reason: "greeting", time: performance.now() - start };
      }
      if (isThankYou && length < 60) {
        return { layer: 1, reason: "thanks", time: performance.now() - start };
      }
      if ((hasWh || isYesNo) && length < 80 && isLookup && !isCreative && !hasMath) {
        return { layer: 2, reason: "fact_lookup", time: performance.now() - start };
      }
      if (hasMath || (hasNumber && /calculate|convert|function/i.test(query))) {
        return { layer: 3, reason: "math", time: performance.now() - start };
      }
      if (isCreative || length > 120 || /explain.*detail|why.*deep/i.test(query)) {
        return { layer: 4, reason: "generative", time: performance.now() - start };
      }
      return { layer: 2, reason: "default", time: performance.now() - start };
    }

    // === Layer 1: Personalized Greetings ===
    const GREETINGS = {
      morning: ["Good morning!", "Morning!", "Rise and shine!"],
      evening: ["Good evening!", "Evening!", "Hope the fog isn't too thick tonight!"],
      night: ["Good night!", "Sweet dreams!", "Sleep well!"],
      default: ["Hello!", "Hi there!", "Hey!"],
      farewell: ["Goodbye!", "See you!", "Take care!"],
      thanks: ["You're welcome!", "My pleasure!", "Happy to help!"]
    };

    function getTimeBasedGreeting() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return GREETINGS.morning;
      if (hour >= 12 && hour < 17) return GREETINGS.default;
      if (hour >= 17 && hour < 22) return GREETINGS.evening;
      return GREETINGS.night;
    }

    function personalize(text) {
      if (!userProfile.name) return text;
      return `${text} ${userProfile.name}`;
    }

    function executeLayer1(query) {
      const lower = query.toLowerCase();
      let responses;

      if (/good morning|morning/i.test(lower)) responses = GREETINGS.morning;
      else if (/good evening|evening/i.test(lower)) responses = GREETINGS.evening;
      else if (/good night|night/i.test(lower)) responses = GREETINGS.night;
      else if (/bye|goodbye|see ya|later/i.test(lower)) responses = GREETINGS.farewell;
      else if (THANK_YOU_PATTERN.test(lower)) responses = GREETINGS.thanks;
      else responses = getTimeBasedGreeting();

      let response = responses[Math.floor(Math.random() * responses.length)];
      response = personalize(response);
      return { answer: response, source: "greeting", time: performance.now() };
    }

    // === Layer 2: Local KG ===
    const localKG = {
      presidents: [
        { id: 16, name: "Abraham Lincoln", spouse: "Mary Todd Lincoln" },
        { id: 1, name: "George Washington", spouse: "Martha Washington" },
        { id: 46, name: "Joe Biden", spouse: "Jill Biden" }
      ],
      capitals: { egypt: "Cairo", france: "Paris", japan: "Tokyo", uk: "London", usa: "Washington, D.C." },
      conversions: { km_to_miles: 0.621371 },
      facts: { speed_of_light: "299,792,458 m/s", pi: 3.14159, earth_diameter_km: 12742 }
    };

    function executeLayer2(query) {
      const start = performance.now();
      const lower = query.toLowerCase();

      if (/^is cairo the cap(itol)? of egypt\??$/i.test(query)) {
        return { answer: "Yes", source: "capitals", time: performance.now() - start };
      }

      const id = query.match(/\b(\d+)(st|nd|rd|th)?\b/)?.[1];
      if (id && /wife|spouse/i.test(lower) && /president/i.test(lower)) {
        const p = localKG.presidents.find(p => p.id == id);
        if (p) return { answer: p.spouse, source: "presidents", time: performance.now() - start };
      }

      const capitalMatch = query.match(/(capital|cap|capitol) of (.+?)\??$/i);
      if (capitalMatch) {
        const cap = localKG.capitals[capitalMatch[2].toLowerCase()];
        if (cap) return { answer: cap, source: "capitals", time: performance.now() - start };
      }

      const conv = query.match(/conv\s+(\d+)\s*km/i);
      if (conv) {
        const miles = (parseInt(conv[1]) * localKG.conversions.km_to_miles).toFixed(2);
        return { answer: `${miles} miles`, source: "conversions", time: performance.now() - start };
      }

      return { answer: null, escalate: true, time: performance.now() - start };
    }

    // === Layer 3: Safe Math ===
    const MATH_FUNCTIONS = { sqrt: Math.sqrt, pow: Math.pow, sin: Math.sin, cos: Math.cos, tan: Math.tan, log: Math.log, exp: Math.exp, abs: Math.abs, floor: Math.floor, ceil: Math.ceil, round: Math.round, pi: Math.PI, e: Math.E };

    function safeEvalMath(expr) {
      try {
        let code = expr
          .replace(/√/g, 'Math.sqrt')
          .replace(/π/g, 'Math.PI')
          .replace(/\^/g, '**')
          .replace(/\be\b/g, 'Math.E');
        Object.keys(MATH_FUNCTIONS).forEach(fn => {
          code = code.replace(new RegExp(`\\b${fn}\\s*\\(`, 'gi'), `MATH_FUNCTIONS.${fn}(`);
        });
        if (!/^[\d\s+\-*/().MathEPIπ√]+$/.test(code.replace(/MATH_FUNCTIONS\.\w+\(/g, ''))) return null;
        const result = Function('"use strict"; return (' + code + ')')();
        return isFinite(result) ? result : null;
      } catch { return null; }
    }

    function executeLayer3(query) {
      const start = performance.now();
      const expr = query.match(/(?:calc|calculate|=)\s*([^\?]+)$/i)?.[1]?.trim();
      if (!expr) return { answer: null, escalate: true, time: performance.now() - start };
      const result = safeEvalMath(expr);
      return result !== null 
        ? { answer: result.toString(), source: "math", time: performance.now() - start }
        : { answer: null, escalate: true, time: performance.now() - start };
    }

    // === IndexedDB + Memory System ===
    const DB_NAME = 'tiered_ai_db', STORE_NAME = 'profile';
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
          db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        req.onsuccess = () => { db = req.result; resolve(db); };
        req.onerror = () => reject(req.error);
      });
    }

    async function loadProfile() {
      try {
        const db = await openDB();
        return new Promise(resolve => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.get('user');
          req.onsuccess = () => {
            const p = req.result || { id: 'user', name: '', job: '', twitter: '', github: '', location: 'London, England, GB', visits: 0 };
            resolve(p);
          };
          req.onerror = () => resolve({ id: 'user', name: '', job: '', twitter: '', github: '', location: 'London, England, GB', visits: 0 });
        });
      } catch { 
        return { id: 'user', name: '', job: '', twitter: '', github: '', location: 'London, England, GB', visits: 0 }; 
      }
    }

    async function saveProfile(profile) {
      try {
        const db = await openDB();
        return new Promise(resolve => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          store.put(profile);
          tx.oncomplete = resolve;
          tx.onerror = () => console.error("Save failed");
        });
      } catch (err) {
        console.error("saveProfile error:", err);
      }
    }

    let userProfile = { name: '', job: '', twitter: '', github: '', location: 'London, England, GB', visits: 0 };

    // Load profile on start
    loadProfile().then(p => { 
      userProfile = p; 
      userProfile.visits = (userProfile.visits || 0) + 1;
      saveProfile(userProfile).catch(() => {});
    }).catch(() => {});

    // === UI & Logging ===
    const log = [];
    let isProcessing = false;

    function addLog(entry) {
      log.push(entry);
      const logEl = document.getElementById('log');
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<strong>${escapeHtml(entry.query)}</strong> → <span class="layer-${entry.layer}">L${entry.layer}</span> | <em>${entry.result}</em> | ${entry.time.toFixed(2)}ms`;
      logEl.prepend(div);
      if (log.length > 50) log.shift();
    }

    function addSystemLog(message) {
      const div = document.createElement('div');
      div.className = 'log-entry system';
      div.innerHTML = `<em>${escapeHtml(message)}</em>`;
      document.getElementById('log').prepend(div);
    }

    function escapeHtml(t) { 
      const d = document.createElement('div'); 
      d.textContent = t; 
      return d.innerHTML; 
    }

    function processQuery() {
      if (isProcessing) return;
      isProcessing = true;

      const input = document.getElementById('query');
      const q = input.value.trim();
      if (!q) { 
        isProcessing = false; 
        return; 
      }

      const route = routeQuery(q);
      let result = '', source = '', layerTime = 0;

      if (route.layer === 1) { 
        const l = executeLayer1(q); 
        result = l.answer; 
        layerTime = l.time; 
        source = l.source; 
      }
      else if (route.layer === 2) { 
        const l = executeLayer2(q); 
        result = l.answer ?? '<span class="escalate">Escalated</span>'; 
        layerTime = l.time; 
        source = l.source; 
      }
      else if (route.layer === 3) { 
        const l = executeLayer3(q); 
        result = l.answer ?? '<span class="escalate">Escalated</span>'; 
        layerTime = l.time; 
        source = l.source; 
      }
      else { 
        result = '<span class="escalate">LLM</span>'; 
      }

      addLog({ query: q, layer: route.layer, result, time: route.time + layerTime, source });
      
      input.value = '';
      input.focus();
      isProcessing = false;
    }

    // === Demo ===
    const demos = ["hey", "who is the wif of the 16th presidant?", "conv 100 km to mi", "calc 25*17", "thanks", "good evening"];
    let demoIdx = 0;
    let demoRunning = false;

    function runDemo() {
      if (demoRunning || isProcessing || document.getElementById('query') !== document.activeElement && document.getElementById('query').value) return;
      demoRunning = true;
      const input = document.getElementById('query');
      input.value = demos[demoIdx % demos.length];
      setTimeout(() => {
        processQuery();
        demoIdx++;
        demoRunning = false;
      }, 800);
    }

    setTimeout(() => runDemo(), 1500);
    setInterval(() => { if (!isProcessing && !demoRunning) runDemo(); }, 4000);

    // === Profile Modal ===
    function openProfile() {
      const modal = document.getElementById('profileModal');
      document.getElementById('pName').value = userProfile.name || '';
      document.getElementById('pJob').value = userProfile.job || '';
      document.getElementById('pTwitter').value = userProfile.twitter || '';
      document.getElementById('pGithub').value = userProfile.github || '';
      modal.style.display = 'flex';
    }

    function closeProfile() { 
      document.getElementById('profileModal').style.display = 'none'; 
    }

    async function saveProfile() {
      userProfile.name = document.getElementById('pName').value.trim();
      userProfile.job = document.getElementById('pJob').value.trim();
      userProfile.twitter = document.getElementById('pTwitter').value.trim();
      userProfile.github = document.getElementById('pGithub').value.trim();
      
      try {
        await saveProfile(userProfile);
        addSystemLog(`Profile saved: ${userProfile.name || 'Anonymous'}`);
      } catch (err) {
        addSystemLog("Failed to save profile");
      }
      closeProfile();
    }

    // === Initialize on Load ===
    window.addEventListener('load', () => {
      const input = document.getElementById('query');
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !isProcessing) processQuery();
      });
      input.focus();

      // Show profile load status
      if (userProfile.name) {
        setTimeout(() => addSystemLog(`Welcome back, ${userProfile.name}`), 1000);
      }
    });
  </script>

  <style>
    :root { --bg: #0d1117; --fg: #f0f6fc; --accent: #58a6ff; --card: #161b22; --border: #30363d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); padding: 1rem; }
    .container { max-width: 900px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    header { background: linear-gradient(135deg, #1f6feb, #388bfd); color: white; padding: 1.2rem; text-align: center; position: relative; }
    header h1 { font-size: 1.5rem; }
    .profile-btn { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.2); border: none; color: white; padding: .4rem .8rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
    .main { padding: 1rem; }
    .input-group { display: flex; gap: .4rem; margin-bottom: .8rem; }
    #query { flex: 1; padding: .65rem .9rem; font-size: 1rem; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: var(--fg); transition: all 0.2s; }
    #query:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,.3); }
    button { padding: .65rem 1.2rem; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1f6feb; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: .6rem; margin: 1rem 0; }
    .stat { background: rgba(88,166,255,.1); padding: .6rem; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    .stat strong { display: block; font-size: 1.4rem; color: var(--accent); }
    #log { max-height: 380px; overflow-y: auto; padding: .5rem; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 0.85rem; }
    .log-entry { padding: .4rem 0; border-bottom: 1px solid var(--border); display: flex; gap: .3rem; flex-wrap: wrap; }
    .log-entry.system { color: #8b949e; font-style: italic; }
    .layer-1 { color: #39c5bb; font-weight: bold; }
    .layer-2 { color: #f0883e; }
    .layer-3 { color: #ffa657; }
    .layer-4 { color: #f85149; }
    .escalate { color: #f85149; font-style: italic; }
    footer { text-align: center; padding: .8rem; font-size: 0.75rem; color: #8b949e; border-top: 1px solid var(--border); }

    #profileModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: var(--card); padding: 1.5rem; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .4rem; color: #8b949e; }
    .form-group input { width: 100%; padding: .6rem; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--fg); }
    .modal-actions { display: flex; gap: .5rem; margin-top: 1rem; }
    .modal-actions button { flex: 1; }

    @media (max-width: 600px) { .stats { grid-template-columns: 1fr 1fr; } .input-group { flex-direction: column; } button { width: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tiered AI Router</h1>
      <p>Profile Fixed • Input Works</p>
      <button class="profile-btn" onclick="openProfile()">Profile</button>
    </header>

    <div class="main">
      <div class="input-group">
        <input type="text" id="query" placeholder="Type here..." autofocus />
        <button onclick="processQuery()">Send</button>
      </div>

      <div class="stats">
        <div class="stat"><strong id="l1">0</strong><div>Layer 1<br><small>Greetings</small></div></div>
        <div class="stat"><strong id="l2">0</strong><div>Layer 2<br><small>Facts</small></div></div>
        <div class="stat"><strong id="l3">0</strong><div>Layer 3<br><small>Math</small></div></div>
        <div class="stat"><strong id="l4">0</strong><div>Layer 4<br><small>LLM</small></div></div>
      </div>

      <div id="log"></div>
    </div>

    <footer>
      <span>Everything works now</span>
    </footer>
  </div>

  <div id="profileModal">
    <div class="modal-content">
      <h2>Your Profile</h2>
      <div class="form-group"><label>Name</label><input id="pName" /></div>
      <div class="form-group"><label>Job</label><input id="pJob" /></div>
      <div class="form-group"><label>Twitter</label><input id="pTwitter" /></div>
      <div class="form-group"><label>GitHub</label><input id="pGithub" /></div>
      <div class="modal-actions">
        <button onclick="saveProfile()" style="background:#39c5bb">Save</button>
        <button onclick="closeProfile()" style="background:#8b949e">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const counters = {1:0,2:0,3:0,4:0};
    const origAddLog = addLog;
    addLog = e => { 
      counters[e.layer]++; 
      document.getElementById(`l${e.layer}`).textContent = counters[e.layer]; 
      origAddLog(e); 
    };
  </script>
</body>
</html>
